name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ios:
    name: iOS Debug Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NightFlix
        run: |
          xcodebuild \
            -project NightFlix.xcodeproj \
            -scheme NightFlix \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
