name: Nightly IPA Release

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-ipa-release
  cancel-in-progress: true

env:
  PROJECT: NightFlix.xcodeproj
  SCHEME: NightFlix
  CONFIGURATION: Release
  PRODUCT_NAME: NightFlix
  BUNDLE_IDENTIFIER: FrizzleM.NightFlix

jobs:
  build:
    name: Build nightly IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        if: ${{ vars.XCODE_APP != '' }}
        run: sudo xcode-select -s "/Applications/${{ vars.XCODE_APP }}/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare nightly metadata
        id: nightly
        shell: bash
        run: |
          set -euo pipefail

          run_date="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          tag_name="nightly-${run_date}-${short_sha}"

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "ipa_name=NightFlix-${tag_name}.ipa" >> "$GITHUB_OUTPUT"
          echo "release_title=NightFlix Nightly ${run_date} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Import iOS signing assets
        shell: bash
        env:
          IOS_BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM || secrets.IOS_DEVELOPMENT_TEAM }}
        run: ci/import-ios-signing-assets.sh

      - name: Build IPA
        id: build
        shell: bash
        env:
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          EXPORT_METHOD: ${{ vars.IOS_NIGHTLY_EXPORT_METHOD || 'release-testing' }}
          IPA_NAME: ${{ steps.nightly.outputs.ipa_name }}
        run: ci/build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightFlix-nightly-${{ steps.nightly.outputs.tag_name }}
          path: dist/*
          if-no-files-found: error

      - name: Create nightly tag
        shell: bash
        env:
          TAG_NAME: ${{ steps.nightly.outputs.tag_name }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" > /dev/null; then
            tag_sha="$(git rev-list -n 1 "$TAG_NAME")"

            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag $TAG_NAME already exists at $tag_sha, not this commit $GITHUB_SHA."
              exit 1
            fi
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG_NAME"
          fi

      - name: Publish nightly prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ steps.nightly.outputs.release_title }}
          TAG_NAME: ${{ steps.nightly.outputs.tag_name }}
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/nightly-release-notes.md"

          {
            echo "Nightly NightFlix IPA from \`$GITHUB_SHA\`."
            echo
            echo "This is a prerelease build and may include unfinished changes."
          } > "$notes_file"

          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file "$notes_file" --prerelease
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$RELEASE_TITLE" --notes-file "$notes_file" --prerelease
          fi
