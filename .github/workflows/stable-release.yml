name: Stable IPA Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Stable release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: stable-ipa-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT: NightFlix.xcodeproj
  SCHEME: NightFlix
  CONFIGURATION: Release
  PRODUCT_NAME: NightFlix
  BUNDLE_IDENTIFIER: FrizzleM.NightFlix
  XCODE_APP: ${{ vars.XCODE_APP || 'Xcode_26.5.app' }}

jobs:
  build:
    name: Build stable IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/${XCODE_APP}/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag_name="$INPUT_TAG_NAME"
          else
            tag_name="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag_name" =~ ^v[0-9]+[.][0-9]+([.][0-9]+)?$ ]]; then
            echo "::error::Stable release tags must look like v1.0 or v1.0.0."
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "ipa_name=NightFlix-${tag_name}.ipa" >> "$GITHUB_OUTPUT"
          echo "marketing_version=${tag_name#v}" >> "$GITHUB_OUTPUT"
          echo "release_title=NightFlix ${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Import iOS signing assets
        shell: bash
        env:
          IOS_BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM || secrets.IOS_DEVELOPMENT_TEAM }}
        run: ci/import-ios-signing-assets.sh

      - name: Build IPA
        id: build
        shell: bash
        env:
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
          EXPORT_METHOD: ${{ vars.IOS_STABLE_EXPORT_METHOD || 'debugging' }}
          IPA_NAME: ${{ steps.release.outputs.ipa_name }}
          MARKETING_VERSION: ${{ steps.release.outputs.marketing_version }}
        run: ci/build-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightFlix-stable-${{ steps.release.outputs.tag_name }}
          path: dist/*
          if-no-files-found: error

      - name: Create manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" > /dev/null; then
            tag_sha="$(git rev-list -n 1 "$TAG_NAME")"

            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag $TAG_NAME already exists at $tag_sha, not this commit $GITHUB_SHA."
              exit 1
            fi
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG_NAME"
          fi

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ steps.release.outputs.release_title }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/stable-release-notes.md"

          {
            echo "Stable NightFlix IPA for \`$TAG_NAME\`."
            echo
            echo "Commit: \`$GITHUB_SHA\`"
          } > "$notes_file"

          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file "$notes_file" --latest
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --title "$RELEASE_TITLE" --notes-file "$notes_file" --latest
          fi
